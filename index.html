<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mac's Bookshelf</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --ink: #23271f;
    --paper: #eef2e9;
    --paper-2: #dee7d7;
    --line: #c3d0ba;
    --accent: #8a3b2f;
    --accent-2: #2f5233;
    --gold: #b8873a;
    --muted: #6d7867;
    --card: #f8faf6;
    --shadow: 0 1px 2px rgba(35,39,31,0.06), 0 4px 14px rgba(35,39,31,0.06);
    --radius: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  ::selection { background: var(--gold); color: white; }

  .bg-texture {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(36,31,26,0.035) 1px, transparent 0);
    background-size: 22px 22px;
  }

  header {
    position: relative; z-index: 1;
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper) 100%);
  }
  .header-inner { max-width: 1080px; margin: 0 auto; display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(28px, 5vw, 40px);
    margin: 0;
    letter-spacing: -0.01em;
  }
  h1 .accent-dot { color: var(--accent); }
  .tagline { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .stats-row { display: flex; gap: 18px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
  .stats-row b { color: var(--ink); font-weight: 600; }

  main { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 20px; }

  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 18px;
  }
  .search-wrap { position: relative; flex: 1 1 220px; min-width: 180px; }
  input[type="text"], select, textarea {
    font-family: inherit; font-size: 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; color: var(--ink);
    width: 100%;
  }
  input[type="text"]:focus, select:focus, textarea:focus, button:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  select { cursor: pointer; }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    font-size: 13px; padding: 6px 13px; border-radius: 100px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; color: var(--ink); white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
  }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip:hover:not(.active) { border-color: var(--accent); }

  .btn {
    font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 10px 16px; border-radius: 8px; border: 1px solid var(--ink);
    background: var(--ink); color: var(--paper); cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: #3a332b; }
  .btn.secondary { background: transparent; color: var(--ink); }
  .btn.secondary:hover { background: var(--paper-2); }
  .btn.accent { background: var(--accent); border-color: var(--accent); }
  .btn.accent:hover { background: #a1493a; }
  .btn:disabled { opacity: .5; cursor: default; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px;
  }

  .book-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px; box-shadow: var(--shadow); display: flex; flex-direction: row; gap: 12px;
    cursor: pointer; position: relative; border-left: 4px solid var(--tier-color, var(--line));
  }
  .book-card:hover { border-color: var(--accent); }
  .book-card.is-read {
    background: #d6e6c6; border-color: #99c179;
  }
  .book-card.is-read .book-title { color: #24401f; }
  .read-check {
    position: absolute; top: 10px; right: 10px; width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent-2); color: white; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .book-cover {
    flex: none; width: 56px; height: 84px; border-radius: 4px; object-fit: cover;
    background: var(--paper-2); box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }
  .book-cover.placeholder {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px; color: var(--muted);
    background: linear-gradient(150deg, var(--paper-2), var(--line));
  }
  .book-card-body { display: flex; flex-direction: column; gap: 8px; min-width: 0; flex: 1; }
  .book-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; line-height: 1.25; }
  .book-author { font-size: 13px; color: var(--muted); }
  .book-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
    padding: 3px 8px; border-radius: 100px; background: var(--paper-2); color: var(--muted);
  }
  .tag.status-reading { background: #e3ecdd; color: var(--accent-2); }
  .tag.status-read { background: #dde6ea; color: #2b5468; }
  .tag.status-dnf { background: #ecdcdc; color: #8a3b2f; }
  .tag.status-want_to_read { background: var(--paper-2); color: var(--muted); }
  .tier-badge {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 100px;
    background: var(--tier-color, var(--paper-2)); color: white;
  }
  .tier-badge.untiered { background: var(--paper-2); color: var(--muted); }
  .stars { font-size: 12px; color: var(--gold); }

  .view-toggle { display: flex; gap: 4px; }
  .view-toggle .chip { padding: 8px 12px; }

  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--card); }
  table.book-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .book-table th {
    text-align: left; padding: 9px 10px; background: var(--paper-2); font-size: 11px;
    text-transform: uppercase; letter-spacing: .03em; color: var(--muted); white-space: nowrap;
  }
  .book-table td { padding: 6px 10px; border-top: 1px solid var(--line); vertical-align: middle; }
  .book-table tbody tr { cursor: pointer; }
  .book-table tbody tr:hover td { background: var(--paper-2); }
  .book-table tbody tr.is-read td { background: #d6e6c6; }
  .book-table tbody tr.is-read .row-title { color: #24401f; }
  .row-cover {
    width: 28px; height: 40px; object-fit: cover; border-radius: 3px; background: var(--paper-2); display: block;
  }
  .row-cover.placeholder {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 12px; color: var(--muted);
  }
  .row-title { font-weight: 600; white-space: nowrap; }
  .row-author { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .row-tier-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .row-stars { color: var(--gold); white-space: nowrap; font-size: 12px; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .big { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-bottom: 6px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(36,31,26,0.5); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal {
    background: var(--paper); border-radius: 14px; max-width: 520px; width: 100%;
    max-height: 88vh; overflow-y: auto; padding: 26px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .modal h2 { font-family: 'Fraunces', serif; margin: 0 0 4px; font-size: 22px; }
  .modal .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); margin-bottom: 5px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
  .modal-actions .left { margin-right: auto; }

  .tier-picker { display: flex; gap: 5px; flex-wrap: wrap; }
  .tier-opt {
    flex: 1; min-width: 38px; text-align: center; padding: 8px 4px; border-radius: 6px;
    border: 1px solid var(--line); cursor: pointer; font-size: 12px; font-weight: 700; color: white;
  }
  .tier-opt.selected { outline: 3px solid var(--ink); outline-offset: 1px; }

  .status-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-opt {
    flex: 1; text-align: center; padding: 8px 6px; border-radius: 6px; border: 1px solid var(--line);
    cursor: pointer; font-size: 12px; font-weight: 600; background: var(--card);
  }
  .status-opt.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .ai-suggest-box {
    background: var(--paper-2); border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 13px;
  }
  .ai-suggest-box.loading { color: var(--muted); font-style: italic; }
  .rating-picker { display: flex; gap: 4px; }
  .rating-picker button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--line); padding: 0; line-height: 1; }
  .rating-picker button.filled { color: var(--gold); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 10px 18px; border-radius: 100px;
    font-size: 13px; z-index: 100; box-shadow: var(--shadow);
  }

  .footer-fab {
    position: fixed; bottom: 20px; right: 20px; z-index: 30; display: flex; gap: 10px;
  }
  .fab {
    border-radius: 100px; padding: 13px 20px; box-shadow: 0 6px 20px rgba(0,0,0,.2);
    font-family: inherit; font-weight: 700; font-size: 14px; border: none; cursor: pointer;
  }
  .fab.primary { background: var(--accent); color: white; }
  .fab.secondary { background: var(--ink); color: var(--paper); }

  .conn-banner {
    background: #f6e6c8; border-bottom: 1px solid var(--gold); padding: 8px 20px; font-size: 13px;
    text-align: center; color: #6b4d1a;
  }

  .batch-progress {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 16px; font-size: 13px;
  }
  .batch-progress .bar-track {
    background: var(--paper-2); border-radius: 100px; height: 8px; overflow: hidden; margin-top: 8px;
  }
  .batch-progress .bar-fill {
    background: var(--accent); height: 100%; transition: width .3s ease;
  }
  .batch-progress .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

  @media (prefers-reduced-motion: no-preference) {
    .book-card { transition: transform .15s ease, border-color .15s ease; }
    .book-card:hover { transform: translateY(-2px); }
  }
  @media (max-width: 640px) {
    .footer-fab { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="bg-texture"></div>

<header>
  <div class="header-inner">
    <div>
      <h1>Mac's Bookshelf<span class="accent-dot">.</span></h1>
      <div class="tagline">your reading list, ranked and ready</div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>
</header>

<main>
  <div id="connBannerSlot"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search title or author…" />
    </div>
    <select id="sortSelect">
      <option value="title">Sort: Title A–Z</option>
      <option value="author">Sort: Author A–Z</option>
      <option value="tier-asc">Sort: Easiest first</option>
      <option value="tier-desc">Sort: Hardest first</option>
      <option value="length-asc">Sort: Shortest first</option>
      <option value="length-desc">Sort: Longest first</option>
      <option value="recent">Sort: Recently added</option>
    </select>
    <select id="statusFilter">
      <option value="">All statuses</option>
      <option value="want_to_read">Want to read</option>
      <option value="reading">Currently reading</option>
      <option value="read">Read</option>
      <option value="dnf">Did not finish</option>
    </select>
    <button class="btn secondary" id="randomBtn">🎲 Pick for me</button>
    <button class="btn secondary" id="batchRateBtn">✨ Auto-rate all</button>
    <button class="btn secondary" id="batchCoverBtn">🖼️ Fetch cover art</button>
    <div class="view-toggle">
      <button class="chip active" id="viewGridBtn">▦ Grid</button>
      <button class="chip" id="viewTableBtn">☰ List</button>
    </div>
  </div>

  <div id="batchProgressSlot"></div>

  <div class="chip-row" id="categoryChips"></div>

  <div class="grid" id="bookGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="big">No books match</div>
    <div>Try clearing filters or search.</div>
  </div>
</main>

<div class="footer-fab">
  <button class="fab secondary" id="settingsFab" title="Backend settings">⚙</button>
  <button class="fab primary" id="addFab">+ Add book</button>
</div>

<div id="modalSlot"></div>
<div id="toastSlot"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ---------- Config ----------
const DEFAULT_URL = "https://fyhacwcfktdrnbyfyjdl.supabase.co";
const DEFAULT_KEY = "sb_publishable_TsgJYhPGkqN1pLJxSi6K7A_QnCHgyr_";

let SUPABASE_URL = localStorage.getItem('shelf_supabase_url') || DEFAULT_URL;
let SUPABASE_KEY = localStorage.getItem('shelf_supabase_key') || DEFAULT_KEY;
let GEMINI_KEY = localStorage.getItem('shelf_gemini_key') || '';
let supabase = null;
let connected = false;

function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_KEY) { connected = false; return; }
  try {
    supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    connected = true;
  } catch (e) {
    connected = false;
  }
}
initSupabase();

const TIER_COLORS = {
  1: '#7fae7a', 2: '#a3b45c', 3: '#c9a63e', 4: '#c98a3e',
  5: '#c46b3e', 6: '#b8503f', 7: '#8a3b2f'
};
const TIER_LABELS = {
  1: 'Breezy', 2: 'Easy', 3: 'Light lift', 4: 'Moderate',
  5: 'Challenging', 6: 'Dense', 7: 'Brutal'
};
const STATUS_LABELS = {
  want_to_read: 'Want to read', reading: 'Reading', read: 'Read', dnf: 'Did not finish'
};

let books = [];
let state = { search: '', category: '', status: '', sort: 'title', view: localStorage.getItem('shelf_view') || 'grid' };

// ---------- Toast ----------
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toastSlot').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ---------- Data layer ----------
async function loadBooks() {
  if (!connected) { renderConnBanner(); return; }
  const { data, error } = await supabase.from('books').select('*').order('title');
  if (error) {
    connected = false;
    renderConnBanner(error.message);
    return;
  }
  books = data;
  renderAll();
}

async function saveBook(book) {
  if (!connected) { toast('Not connected to backend'); return null; }
  if (book.id) {
    const { data, error } = await supabase.from('books').update(book).eq('id', book.id).select();
    if (error) { toast('Save failed: ' + error.message); return null; }
    return data[0];
  } else {
    const { data, error } = await supabase.from('books').insert(book).select();
    if (error) { toast('Save failed: ' + error.message); return null; }
    return data[0];
  }
}

async function deleteBook(id) {
  if (!connected) { toast('Not connected to backend'); return; }
  const { error } = await supabase.from('books').delete().eq('id', id);
  if (error) { toast('Delete failed: ' + error.message); return; }
}

// ---------- Rendering ----------
function renderConnBanner(msg) {
  const slot = document.getElementById('connBannerSlot');
  if (connected) { slot.innerHTML = ''; return; }
  slot.innerHTML = `<div class="conn-banner">Not connected to your backend${msg ? ': ' + msg : ''} — click ⚙ to set your Supabase URL &amp; key.</div>`;
}

function getCategories() {
  return [...new Set(books.map(b => b.category))].sort();
}

function renderChips() {
  const cats = getCategories();
  const wrap = document.getElementById('categoryChips');
  wrap.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (state.category === '' ? ' active' : '');
  all.textContent = `All (${books.length})`;
  all.onclick = () => { state.category = ''; renderAll(); };
  wrap.appendChild(all);
  cats.forEach(cat => {
    const count = books.filter(b => b.category === cat).length;
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.category === cat ? ' active' : '');
    chip.textContent = `${cat} (${count})`;
    chip.onclick = () => { state.category = (state.category === cat ? '' : cat); renderAll(); };
    wrap.appendChild(chip);
  });
}

function renderStats() {
  const total = books.length;
  const read = books.filter(b => b.status === 'read').length;
  const reading = books.filter(b => b.status === 'reading').length;
  document.getElementById('statsRow').innerHTML =
    `<span><b>${total}</b> books</span><span><b>${read}</b> read</span><span><b>${reading}</b> in progress</span>`;
}

function filteredSorted() {
  let list = books.filter(b => {
    if (state.category && b.category !== state.category) return false;
    if (state.status && b.status !== state.status) return false;
    if (state.search) {
      const s = state.search.toLowerCase();
      if (!b.title.toLowerCase().includes(s) && !(b.author || '').toLowerCase().includes(s)) return false;
    }
    return true;
  });
  switch (state.sort) {
    case 'title': list.sort((a, b) => a.title.localeCompare(b.title)); break;
    case 'author': list.sort((a, b) => (a.author || '').localeCompare(b.author || '')); break;
    case 'tier-asc': list.sort((a, b) => (a.difficulty_tier || 99) - (b.difficulty_tier || 99)); break;
    case 'tier-desc': list.sort((a, b) => (b.difficulty_tier || 0) - (a.difficulty_tier || 0)); break;
    case 'length-asc': list.sort((a, b) => (a.length || 99999) - (b.length || 99999)); break;
    case 'length-desc': list.sort((a, b) => (b.length || 0) - (a.length || 0)); break;
    case 'recent': list.sort((a, b) => new Date(b.date_added) - new Date(a.date_added)); break;
  }
  return list;
}

function renderGrid() {
  const list = filteredSorted();
  const container = document.getElementById('bookGrid');
  const empty = document.getElementById('emptyState');
  empty.style.display = list.length === 0 ? 'block' : 'none';

  if (state.view === 'table') {
    container.className = 'table-wrap';
    container.innerHTML = renderTableHtml(list);
    container.querySelectorAll('tbody tr').forEach(tr => {
      tr.onclick = () => openBookModal(list.find(b => b.id === tr.dataset.id));
    });
  } else {
    container.className = 'grid';
    container.innerHTML = '';
    list.forEach(b => container.appendChild(bookCard(b)));
  }
}

function renderTableHtml(list) {
  const rows = list.map(b => {
    const coverCell = b.cover_url
      ? `<img class="row-cover" src="${escapeHtml(b.cover_url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;row-cover placeholder&quot;>${(b.title[0] || '?').toUpperCase()}</div>'" />`
      : `<div class="row-cover placeholder">${escapeHtml((b.title[0] || '?').toUpperCase())}</div>`;
    const tierCell = b.difficulty_tier
      ? `<span class="row-tier-dot" style="background:${TIER_COLORS[b.difficulty_tier]}"></span>T${b.difficulty_tier}`
      : `<span style="color:var(--muted)">—</span>`;
    const stars = b.rating ? `<span class="row-stars">${'★'.repeat(b.rating)}</span>` : '';
    return `
      <tr class="${b.status === 'read' ? 'is-read' : ''}" data-id="${b.id}">
        <td>${coverCell}</td>
        <td><div class="row-title">${escapeHtml(b.title)}</div><div class="row-author">${escapeHtml(b.author || '')}</div></td>
        <td>${escapeHtml(b.category)}</td>
        <td><span class="tag status-${b.status}">${STATUS_LABELS[b.status]}</span></td>
        <td>${tierCell}</td>
        <td>${b.length ? b.length + 'p' : ''}</td>
        <td>${stars}</td>
      </tr>`;
  }).join('');
  return `
    <table class="book-table">
      <thead><tr><th></th><th>Title</th><th>Category</th><th>Status</th><th>Tier</th><th>Length</th><th>Rating</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function bookCard(b) {
  const card = document.createElement('div');
  card.className = 'book-card' + (b.status === 'read' ? ' is-read' : '');
  if (b.difficulty_tier) card.style.setProperty('--tier-color', TIER_COLORS[b.difficulty_tier]);
  const stars = b.rating ? '★'.repeat(b.rating) + '☆'.repeat(5 - b.rating) : '';
  const coverHtml = b.cover_url
    ? `<img class="book-cover" src="${escapeHtml(b.cover_url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;book-cover placeholder&quot;>${(b.title[0] || '?').toUpperCase()}</div>'" />`

    ${b.status === 'read' ? '<div class="read-check">✓</div>' : ''}
    ${coverHtml}
    <div class="book-card-body">
      <div class="book-title">${escapeHtml(b.title)}</div>
      <div class="book-author">${escapeHtml(b.author || 'Unknown author')}</div>

        <span class="tag status-${b.status}">${STATUS_LABELS[b.status]}</span>

      </div>
      ${stars ? `<div class="stars">${stars}</div>` : ''}
    </div>
  `;
  card.onclick = () => openBookModal(b);
  return card;
}

// ---------- AI difficulty suggestion (Google Gemini free tier) ----------
async function suggestDifficulty(title, author) {
  if (!GEMINI_KEY) {
    const err = new Error('No Gemini API key set — add one in ⚙ Settings');
    err.needsKey = true;
    throw err;
  }
  const prompt = `You are helping rate the reading difficulty of a book on a 7-tier scale for a personal reading tracker.

Tiers:
1 = Breezy / beach read (simple prose, fast pace, no prior knowledge needed)
2 = Easy (straightforward, accessible)
3 = Light lift (some complexity but still accessible)
4 = Moderate (average literary novel, some demands on the reader)
5 = Challenging (dense prose or structure, sustained attention needed)
6 = Dense (difficult prose, nonlinear structure, or heavy subject matter)
7 = Brutal / academic-level (very demanding: experimental structure, archaic language, or highly technical)

Book: "${title}"${author ? ' by ' + author : ''}

Respond with ONLY a JSON object, no markdown fences, no preamble: {"tier": <1-7 integer>, "reason": "<one short sentence, under 20 words>"}`;

  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${GEMINI_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });
  if (!response.ok) {
    const errBody = await response.text();
    throw new Error('Gemini API error ' + response.status + ': ' + errBody.slice(0, 500));
  }
  const data = await response.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('No response from Gemini');
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  if (!parsed.tier || parsed.tier < 1 || parsed.tier > 7) throw new Error('Invalid tier returned');
  return parsed;
}

// ---------- AI new-book suggestion ----------
async function suggestNewBook({ category, difficulty, note, existingTitles }) {
  if (!GEMINI_KEY) {
    const err = new Error('No Gemini API key set — add one in ⚙ Settings');
    err.needsKey = true;
    throw err;
  }
  const diffText = difficulty ? `It should land around tier ${difficulty} on a 7-tier difficulty scale (1=breezy, 7=brutal/academic).` : '';
  const catText = category ? `It should fit the category "${category}".` : 'Pick whatever category fits best.';
  const noteText = note ? `Additional preference: ${note}.` : '';

  const prompt = `Recommend ONE book for a personal reading tracker app.

${catText} ${diffText} ${noteText}

Do NOT recommend any of these books already on the shelf: ${existingTitles.slice(0, 300).join(' | ')}

Respond with ONLY a JSON object, no markdown fences, no preamble:
{"title": "<book title>", "author": "<author name>", "category": "<short category label>", "length": <approx page count as integer>, "tier": <1-7 integer difficulty>, "reason": "<one short sentence, under 25 words, on why this fits>"}`;

  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${GEMINI_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if (!response.ok) {
    const errBody = await response.text();
    throw new Error('Gemini API error ' + response.status + ': ' + errBody.slice(0, 200));
  }
  const data = await response.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('No response from Gemini');
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  if (!parsed.title) throw new Error('No title returned');
  return parsed;
}

// ---------- Cover art (Open Library, free, no key needed) ----------
function cleanTitleForSearch(title) {
  // Strip trailing parenthetical bits like "(2021)" or "(Bloodsworn #1)" that hurt matching.
  return title.replace(/\s*\([^)]*\)/g, '').replace(/\s{2,}/g, ' ').trim();
}

function titleVariants(rawTitle) {
  const clean = cleanTitleForSearch(rawTitle);
  const variants = [clean];
  // "A / B" alternate-title format (e.g. "The Stranger / The Outsider") — try each side
  if (clean.includes('/')) {
    clean.split('/').forEach(part => { const p = part.trim(); if (p) variants.push(p); });
  }
  // "Series Name: Book Title" — try both the part before and after the colon
  if (clean.includes(':')) {
    const [before, ...rest] = clean.split(':');
    const after = rest.join(':').trim();
    if (before.trim()) variants.push(before.trim());
    if (after) variants.push(after);
  }
  return [...new Set(variants)];
}

async function tryFetchCover(query, author) {
  const params = new URLSearchParams({ title: query, limit: '1', fields: 'cover_i' });
  if (author) params.set('author', author);
  const res = await fetch(`https://openlibrary.org/search.json?${params.toString()}`);
  if (!res.ok) return null;
  const data = await res.json();
  return data?.docs?.[0]?.cover_i || null;
}

async function fetchCoverUrl(title, author) {
  const variants = titleVariants(title);
  // Pass 1: each variant with author constraint
  for (const v of variants) {
    const id = await tryFetchCover(v, author);
    if (id) return `https://covers.openlibrary.org/b/id/${id}-M.jpg`;
  }
  // Pass 2: each variant without author (author formatting can itself mismatch)
  if (author) {
    for (const v of variants) {
      const id = await tryFetchCover(v, null);
      if (id) return `https://covers.openlibrary.org/b/id/${id}-M.jpg`;
    }
  }
  // Pass 3: fuzzy full-text search as a last resort
  const q = `${variants[0]}${author ? ' ' + author : ''}`;
  const params = new URLSearchParams({ q, limit: '1', fields: 'cover_i' });
  const res = await fetch(`https://openlibrary.org/search.json?${params.toString()}`);
  if (res.ok) {
    const data = await res.json();
    const id = data?.docs?.[0]?.cover_i;
    if (id) return `https://covers.openlibrary.org/b/id/${id}-M.jpg`;
  }
  return null;
}

let coverBatchRunning = false;
document.getElementById('batchCoverBtn').onclick = async () => {
  if (coverBatchRunning) return;
  const todo = books.filter(b => !b.cover_url);
  if (!todo.length) { toast('Every book already has cover art (or none was found)'); return; }
  if (!confirm(`Look up cover art for ${todo.length} book(s)? This runs in the background.`)) return;

  coverBatchRunning = true;
  const btn = document.getElementById('batchCoverBtn');
  btn.disabled = true;
  const slot = document.getElementById('batchProgressSlot');
  let done = 0, found = 0;

  function renderProgress(currentTitle) {
    const pct = Math.round((done / todo.length) * 100);
    slot.innerHTML = `
      <div class="batch-progress">
        <div class="row">
          <span>Looking up "${escapeHtml(currentTitle || '')}"…</span>
          <span>${done}/${todo.length} · ${found} found</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }
  renderProgress(todo[0]?.title);

  for (const b of todo) {
    if (!coverBatchRunning) break;
    renderProgress(b.title);
    try {
      const url = await fetchCoverUrl(b.title, b.author);
      if (url) {
        const saved = await saveBook({ id: b.id, cover_url: url });
        if (saved) { books = books.map(x => x.id === saved.id ? saved : x); found++; }
      }
    } catch (e) { /* skip on error, try again later */ }
    done++;
    renderProgress(b.title);
    renderGrid();
    await new Promise(r => setTimeout(r, 300));
  }

  coverBatchRunning = false;
  btn.disabled = false;
  slot.innerHTML = `<div class="batch-progress">Done — found covers for ${found} of ${todo.length}.</div>`;
  setTimeout(() => { slot.innerHTML = ''; }, 6000);
  renderAll();
  toast('Cover lookup finished');
};

    try {
      const suggestion = await suggestDifficulty(b.title, b.author);
      const saved = await saveBook({ id: b.id, difficulty_tier: suggestion.tier });
      if (saved) books = books.map(x => x.id === saved.id ? saved : x);
    } catch (e) {
      failed++;
    }
    done++;
    renderProgress(b.title);
    renderGrid();
    // pace requests to stay under free-tier rate limits
    await new Promise(r => setTimeout(r, 4500));
  }

  batchRunning = false;
  btn.disabled = false;
  slot.innerHTML = `<div class="batch-progress">Done — rated ${done - failed} of ${todo.length}${failed ? `, ${failed} skipped (rate limit or error, try again later)` : ''}.</div>`;
  setTimeout(() => { slot.innerHTML = ''; }, 6000);
  renderAll();
  toast('Auto-rating finished');
};

// ---------- Init ----------
document.getElementById('viewGridBtn').classList.toggle('active', state.view === 'grid');
document.getElementById('viewTableBtn').classList.toggle('active', state.view === 'table');
loadBooks();
</script>
</body>
</html>
