<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shelf — Reading Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --ink: #241f1a;
    --paper: #f6f1e7;
    --paper-2: #ede4d3;
    --line: #d8cbb0;
    --accent: #8a3b2f;
    --accent-2: #2f5233;
    --gold: #b8873a;
    --muted: #7a7061;
    --card: #fffdf8;
    --shadow: 0 1px 2px rgba(36,31,26,0.06), 0 4px 14px rgba(36,31,26,0.06);
    --radius: 10px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  ::selection { background: var(--gold); color: white; }

  .bg-texture {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(36,31,26,0.035) 1px, transparent 0);
    background-size: 22px 22px;
  }

  header {
    position: relative; z-index: 1;
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper) 100%);
  }
  .header-inner { max-width: 1080px; margin: 0 auto; display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(28px, 5vw, 40px);
    margin: 0;
    letter-spacing: -0.01em;
  }
  h1 .accent-dot { color: var(--accent); }
  .tagline { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .stats-row { display: flex; gap: 18px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
  .stats-row b { color: var(--ink); font-weight: 600; }

  main { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 20px; }

  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 18px;
  }
  .search-wrap { position: relative; flex: 1 1 220px; min-width: 180px; }
  input[type="text"], select, textarea {
    font-family: inherit; font-size: 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 12px; color: var(--ink);
    width: 100%;
  }
  input[type="text"]:focus, select:focus, textarea:focus, button:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  select { cursor: pointer; }
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    font-size: 13px; padding: 6px 13px; border-radius: 100px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; color: var(--ink); white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
  }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip:hover:not(.active) { border-color: var(--accent); }

  .btn {
    font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 10px 16px; border-radius: 8px; border: 1px solid var(--ink);
    background: var(--ink); color: var(--paper); cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: #3a332b; }
  .btn.secondary { background: transparent; color: var(--ink); }
  .btn.secondary:hover { background: var(--paper-2); }
  .btn.accent { background: var(--accent); border-color: var(--accent); }
  .btn.accent:hover { background: #a1493a; }
  .btn:disabled { opacity: .5; cursor: default; }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px;
  }

  .book-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 8px;
    cursor: pointer; position: relative; border-left: 4px solid var(--tier-color, var(--line));
  }
  .book-card:hover { border-color: var(--accent); }
  .book-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; line-height: 1.25; }
  .book-author { font-size: 13px; color: var(--muted); }
  .book-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tag {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em;
    padding: 3px 8px; border-radius: 100px; background: var(--paper-2); color: var(--muted);
  }
  .tag.status-reading { background: #e3ecdd; color: var(--accent-2); }
  .tag.status-read { background: #dde6ea; color: #2b5468; }
  .tag.status-dnf { background: #ecdcdc; color: #8a3b2f; }
  .tag.status-want_to_read { background: var(--paper-2); color: var(--muted); }
  .tier-badge {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 100px;
    background: var(--tier-color, var(--paper-2)); color: white;
  }
  .tier-badge.untiered { background: var(--paper-2); color: var(--muted); }
  .stars { font-size: 12px; color: var(--gold); }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .big { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink); margin-bottom: 6px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(36,31,26,0.5); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal {
    background: var(--paper); border-radius: 14px; max-width: 520px; width: 100%;
    max-height: 88vh; overflow-y: auto; padding: 26px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .modal h2 { font-family: 'Fraunces', serif; margin: 0 0 4px; font-size: 22px; }
  .modal .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); margin-bottom: 5px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
  .modal-actions .left { margin-right: auto; }

  .tier-picker { display: flex; gap: 5px; flex-wrap: wrap; }
  .tier-opt {
    flex: 1; min-width: 38px; text-align: center; padding: 8px 4px; border-radius: 6px;
    border: 1px solid var(--line); cursor: pointer; font-size: 12px; font-weight: 700; color: white;
  }
  .tier-opt.selected { outline: 3px solid var(--ink); outline-offset: 1px; }

  .status-picker { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-opt {
    flex: 1; text-align: center; padding: 8px 6px; border-radius: 6px; border: 1px solid var(--line);
    cursor: pointer; font-size: 12px; font-weight: 600; background: var(--card);
  }
  .status-opt.selected { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .ai-suggest-box {
    background: var(--paper-2); border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 13px;
  }
  .ai-suggest-box.loading { color: var(--muted); font-style: italic; }
  .rating-picker { display: flex; gap: 4px; }
  .rating-picker button { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--line); padding: 0; line-height: 1; }
  .rating-picker button.filled { color: var(--gold); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 10px 18px; border-radius: 100px;
    font-size: 13px; z-index: 100; box-shadow: var(--shadow);
  }

  .footer-fab {
    position: fixed; bottom: 20px; right: 20px; z-index: 30; display: flex; gap: 10px;
  }
  .fab {
    border-radius: 100px; padding: 13px 20px; box-shadow: 0 6px 20px rgba(0,0,0,.2);
    font-family: inherit; font-weight: 700; font-size: 14px; border: none; cursor: pointer;
  }
  .fab.primary { background: var(--accent); color: white; }
  .fab.secondary { background: var(--ink); color: var(--paper); }

  .conn-banner {
    background: #f6e6c8; border-bottom: 1px solid var(--gold); padding: 8px 20px; font-size: 13px;
    text-align: center; color: #6b4d1a;
  }

  @media (prefers-reduced-motion: no-preference) {
    .book-card { transition: transform .15s ease, border-color .15s ease; }
    .book-card:hover { transform: translateY(-2px); }
  }
  @media (max-width: 640px) {
    .footer-fab { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="bg-texture"></div>

<header>
  <div class="header-inner">
    <div>
      <h1>Shelf<span class="accent-dot">.</span></h1>
      <div class="tagline">your reading list, ranked and ready</div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>
</header>

<main>
  <div id="connBannerSlot"></div>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search title or author…" />
    </div>
    <select id="sortSelect">
      <option value="title">Sort: Title A–Z</option>
      <option value="author">Sort: Author A–Z</option>
      <option value="tier-asc">Sort: Easiest first</option>
      <option value="tier-desc">Sort: Hardest first</option>
      <option value="length-asc">Sort: Shortest first</option>
      <option value="length-desc">Sort: Longest first</option>
      <option value="recent">Sort: Recently added</option>
    </select>
    <select id="statusFilter">
      <option value="">All statuses</option>
      <option value="want_to_read">Want to read</option>
      <option value="reading">Currently reading</option>
      <option value="read">Read</option>
      <option value="dnf">Did not finish</option>
    </select>
    <button class="btn secondary" id="randomBtn">🎲 Pick for me</button>
  </div>

  <div class="chip-row" id="categoryChips"></div>

  <div class="grid" id="bookGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="big">No books match</div>
    <div>Try clearing filters or search.</div>
  </div>
</main>

<div class="footer-fab">
  <button class="fab secondary" id="settingsFab" title="Backend settings">⚙</button>
  <button class="fab primary" id="addFab">+ Add book</button>
</div>

<div id="modalSlot"></div>
<div id="toastSlot"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ---------- Config ----------
const DEFAULT_URL = "https://fyhacwcfktdrnbyfyjdl.supabase.co";
const DEFAULT_KEY = "sb_publishable_TsgJYhPGkqN1pLJxSi6K7A_QnCHgyr_";

let SUPABASE_URL = localStorage.getItem('shelf_supabase_url') || DEFAULT_URL;
let SUPABASE_KEY = localStorage.getItem('shelf_supabase_key') || DEFAULT_KEY;
let GEMINI_KEY = localStorage.getItem('shelf_gemini_key') || '';
let supabase = null;
let connected = false;

function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_KEY) { connected = false; return; }
  try {
    supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    connected = true;
  } catch (e) {
    connected = false;
  }
}
initSupabase();

const TIER_COLORS = {
  1: '#7fae7a', 2: '#a3b45c', 3: '#c9a63e', 4: '#c98a3e',
  5: '#c46b3e', 6: '#b8503f', 7: '#8a3b2f'
};
const TIER_LABELS = {
  1: 'Breezy', 2: 'Easy', 3: 'Light lift', 4: 'Moderate',
  5: 'Challenging', 6: 'Dense', 7: 'Brutal'
};
const STATUS_LABELS = {
  want_to_read: 'Want to read', reading: 'Reading', read: 'Read', dnf: 'Did not finish'
};

let books = [];
let state = { search: '', category: '', status: '', sort: 'title' };

// ---------- Toast ----------
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toastSlot').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ---------- Data layer ----------
async function loadBooks() {
  if (!connected) { renderConnBanner(); return; }
  const { data, error } = await supabase.from('books').select('*').order('title');
  if (error) {
    connected = false;
    renderConnBanner(error.message);
    return;
  }
  books = data;
  renderAll();
}

async function saveBook(book) {
  if (!connected) { toast('Not connected to backend'); return null; }
  if (book.id) {
    const { data, error } = await supabase.from('books').update(book).eq('id', book.id).select();
    if (error) { toast('Save failed: ' + error.message); return null; }
    return data[0];
  } else {
    const { data, error } = await supabase.from('books').insert(book).select();
    if (error) { toast('Save failed: ' + error.message); return null; }
    return data[0];
  }
}

async function deleteBook(id) {
  if (!connected) { toast('Not connected to backend'); return; }
  const { error } = await supabase.from('books').delete().eq('id', id);
  if (error) { toast('Delete failed: ' + error.message); return; }
}

// ---------- Rendering ----------
function renderConnBanner(msg) {
  const slot = document.getElementById('connBannerSlot');
  if (connected) { slot.innerHTML = ''; return; }
  slot.innerHTML = `<div class="conn-banner">Not connected to your backend${msg ? ': ' + msg : ''} — click ⚙ to set your Supabase URL &amp; key.</div>`;
}

function getCategories() {
  return [...new Set(books.map(b => b.category))].sort();
}

function renderChips() {
  const cats = getCategories();
  const wrap = document.getElementById('categoryChips');
  wrap.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (state.category === '' ? ' active' : '');
  all.textContent = `All (${books.length})`;
  all.onclick = () => { state.category = ''; renderAll(); };
  wrap.appendChild(all);
  cats.forEach(cat => {
    const count = books.filter(b => b.category === cat).length;
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.category === cat ? ' active' : '');
    chip.textContent = `${cat} (${count})`;
    chip.onclick = () => { state.category = (state.category === cat ? '' : cat); renderAll(); };
    wrap.appendChild(chip);
  });
}

function renderStats() {
  const total = books.length;
  const read = books.filter(b => b.status === 'read').length;
  const reading = books.filter(b => b.status === 'reading').length;
  document.getElementById('statsRow').innerHTML =
    `<span><b>${total}</b> books</span><span><b>${read}</b> read</span><span><b>${reading}</b> in progress</span>`;
}

function filteredSorted() {
  let list = books.filter(b => {
    if (state.category && b.category !== state.category) return false;
    if (state.status && b.status !== state.status) return false;
    if (state.search) {
      const s = state.search.toLowerCase();
      if (!b.title.toLowerCase().includes(s) && !(b.author || '').toLowerCase().includes(s)) return false;
    }
    return true;
  });
  switch (state.sort) {
    case 'title': list.sort((a, b) => a.title.localeCompare(b.title)); break;
    case 'author': list.sort((a, b) => (a.author || '').localeCompare(b.author || '')); break;
    case 'tier-asc': list.sort((a, b) => (a.difficulty_tier || 99) - (b.difficulty_tier || 99)); break;
    case 'tier-desc': list.sort((a, b) => (b.difficulty_tier || 0) - (a.difficulty_tier || 0)); break;
    case 'length-asc': list.sort((a, b) => (a.length || 99999) - (b.length || 99999)); break;
    case 'length-desc': list.sort((a, b) => (b.length || 0) - (a.length || 0)); break;
    case 'recent': list.sort((a, b) => new Date(b.date_added) - new Date(a.date_added)); break;
  }
  return list;
}

function renderGrid() {
  const list = filteredSorted();
  const grid = document.getElementById('bookGrid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';
  empty.style.display = list.length === 0 ? 'block' : 'none';
  list.forEach(b => grid.appendChild(bookCard(b)));
}

function bookCard(b) {
  const card = document.createElement('div');
  card.className = 'book-card';
  if (b.difficulty_tier) card.style.setProperty('--tier-color', TIER_COLORS[b.difficulty_tier]);
  const stars = b.rating ? '★'.repeat(b.rating) + '☆'.repeat(5 - b.rating) : '';
  card.innerHTML = `
    <div class="book-title">${escapeHtml(b.title)}</div>
    <div class="book-author">${escapeHtml(b.author || 'Unknown author')}</div>
    <div class="book-meta">
      <span class="tag status-${b.status}">${STATUS_LABELS[b.status]}</span>
      <span class="tag">${escapeHtml(b.category)}</span>
      ${b.length ? `<span class="tag">${b.length}p</span>` : ''}
      <span class="tier-badge ${b.difficulty_tier ? '' : 'untiered'}" style="${b.difficulty_tier ? `background:${TIER_COLORS[b.difficulty_tier]}` : ''}">
        ${b.difficulty_tier ? 'T' + b.difficulty_tier + ' · ' + TIER_LABELS[b.difficulty_tier] : 'Unrated'}
      </span>
    </div>
    ${stars ? `<div class="stars">${stars}</div>` : ''}
  `;
  card.onclick = () => openBookModal(b);
  return card;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderAll() {
  renderConnBanner();
  renderStats();
  renderChips();
  renderGrid();
}

// ---------- Modal: Add/Edit Book ----------
function openBookModal(book) {
  const isNew = !book;
  const b = book || { title: '', author: '', category: state.category || (getCategories()[0] || ''), length: '', format: '', status: 'want_to_read', difficulty_tier: null, rating: null, notes: '' };
  const cats = getCategories();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>${isNew ? 'Add a book' : 'Edit book'}</h2>
      <div class="sub">${isNew ? 'Add it to your shelf' : 'Update details, status, or rating'}</div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="f_title" value="${escapeHtml(b.title)}" placeholder="Book title" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Author</label>
          <input type="text" id="f_author" value="${escapeHtml(b.author || '')}" placeholder="Author name" />
        </div>
        <div class="field">
          <label>Length (pages)</label>
          <input type="text" id="f_length" value="${b.length || ''}" placeholder="e.g. 320" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Category</label>
          <input type="text" id="f_category" list="catList" value="${escapeHtml(b.category)}" placeholder="Category" />
          <datalist id="catList">${cats.map(c => `<option value="${escapeHtml(c)}">`).join('')}</datalist>
        </div>
        <div class="field">
          <label>Format</label>
          <input type="text" id="f_format" value="${escapeHtml(b.format || '')}" placeholder="e.g. Ebook, Audiobook" />
        </div>
      </div>

      <div class="field">
        <label>Status</label>
        <div class="status-picker" id="statusPicker">
          ${Object.entries(STATUS_LABELS).map(([k, v]) => `<div class="status-opt ${b.status === k ? 'selected' : ''}" data-val="${k}">${v}</div>`).join('')}
        </div>
      </div>

      <div class="field">
        <label>Difficulty tier (1 = breezy, 7 = brutal)</label>
        <div class="tier-picker" id="tierPicker">
          ${[1,2,3,4,5,6,7].map(t => `<div class="tier-opt ${b.difficulty_tier === t ? 'selected' : ''}" data-val="${t}" style="background:${TIER_COLORS[t]}">${t}</div>`).join('')}
        </div>
        <button class="btn secondary" id="aiSuggestBtn" style="margin-top:8px; width:100%;">✨ Suggest tier with AI</button>
        <div id="aiSuggestSlot"></div>
      </div>

      <div class="field">
        <label>Rating</label>
        <div class="rating-picker" id="ratingPicker">
          ${[1,2,3,4,5].map(r => `<button data-val="${r}" class="${b.rating >= r ? 'filled' : ''}">★</button>`).join('')}
        </div>
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="f_notes" rows="3" placeholder="Thoughts, quotes, why you added it…">${escapeHtml(b.notes || '')}</textarea>
      </div>

      <div class="modal-actions">
        ${!isNew ? `<button class="btn secondary left" id="deleteBtn" style="color:#8a3b2f; border-color:#8a3b2f;">Delete</button>` : ''}
        <button class="btn secondary" id="cancelBtn">Cancel</button>
        <button class="btn accent" id="saveBtn">${isNew ? 'Add book' : 'Save changes'}</button>
      </div>
    </div>
  `;
  document.getElementById('modalSlot').appendChild(overlay);

  let selectedStatus = b.status;
  let selectedTier = b.difficulty_tier;
  let selectedRating = b.rating;

  overlay.querySelectorAll('.status-opt').forEach(el => {
    el.onclick = () => {
      selectedStatus = el.dataset.val;
      overlay.querySelectorAll('.status-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    };
  });
  overlay.querySelectorAll('.tier-opt').forEach(el => {
    el.onclick = () => {
      selectedTier = parseInt(el.dataset.val);
      overlay.querySelectorAll('.tier-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    };
  });
  overlay.querySelectorAll('.rating-picker button').forEach(el => {
    el.onclick = () => {
      const v = parseInt(el.dataset.val);
      selectedRating = (selectedRating === v) ? null : v;
      overlay.querySelectorAll('.rating-picker button').forEach(x => {
        x.classList.toggle('filled', selectedRating && parseInt(x.dataset.val) <= selectedRating);
      });
    };
  });

  overlay.querySelector('#aiSuggestBtn').onclick = async () => {
    const slot = overlay.querySelector('#aiSuggestSlot');
    const title = overlay.querySelector('#f_title').value.trim();
    const author = overlay.querySelector('#f_author').value.trim();
    if (!title) { toast('Enter a title first'); return; }
    slot.innerHTML = `<div class="ai-suggest-box loading">Thinking about "${escapeHtml(title)}"…</div>`;
    try {
      const suggestion = await suggestDifficulty(title, author);
      slot.innerHTML = `<div class="ai-suggest-box"><b>Suggested: Tier ${suggestion.tier} — ${TIER_LABELS[suggestion.tier]}</b><br>${escapeHtml(suggestion.reason)}<br><button class="btn secondary" id="applySuggestion" style="margin-top:8px;">Use tier ${suggestion.tier}</button></div>`;
      overlay.querySelector('#applySuggestion').onclick = () => {
        selectedTier = suggestion.tier;
        overlay.querySelectorAll('.tier-opt').forEach(x => x.classList.toggle('selected', parseInt(x.dataset.val) === suggestion.tier));
      };
    } catch (e) {
      if (e.needsKey) {
        slot.innerHTML = `<div class="ai-suggest-box">No Gemini key set yet. Tap ⚙ (bottom right) to add a free one, then try again.</div>`;
      } else {
        slot.innerHTML = `<div class="ai-suggest-box">Couldn't get a suggestion (${escapeHtml(e.message)}). Pick manually above.</div>`;
      }
    }
  };

  overlay.querySelector('#cancelBtn').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  if (!isNew) {
    overlay.querySelector('#deleteBtn').onclick = async () => {
      if (!confirm(`Remove "${b.title}" from your shelf?`)) return;
      await deleteBook(b.id);
      books = books.filter(x => x.id !== b.id);
      overlay.remove();
      renderAll();
      toast('Book removed');
    };
  }

  overlay.querySelector('#saveBtn').onclick = async () => {
    const title = overlay.querySelector('#f_title').value.trim();
    const category = overlay.querySelector('#f_category').value.trim();
    if (!title || !category) { toast('Title and category are required'); return; }
    const payload = {
      title,
      author: overlay.querySelector('#f_author').value.trim() || null,
      category,
      length: parseInt(overlay.querySelector('#f_length').value) || null,
      format: overlay.querySelector('#f_format').value.trim() || null,
      status: selectedStatus,
      difficulty_tier: selectedTier || null,
      rating: selectedRating || null,
      notes: overlay.querySelector('#f_notes').value.trim() || null,
    };
    if (!isNew) payload.id = b.id;
    const saved = await saveBook(payload);
    if (saved) {
      if (isNew) books.push(saved);
      else books = books.map(x => x.id === saved.id ? saved : x);
      overlay.remove();
      renderAll();
      toast(isNew ? 'Book added' : 'Saved');
    }
  };
}

// ---------- AI difficulty suggestion (Google Gemini free tier) ----------
async function suggestDifficulty(title, author) {
  if (!GEMINI_KEY) {
    const err = new Error('No Gemini API key set — add one in ⚙ Settings');
    err.needsKey = true;
    throw err;
  }
  const prompt = `You are helping rate the reading difficulty of a book on a 7-tier scale for a personal reading tracker.

Tiers:
1 = Breezy / beach read (simple prose, fast pace, no prior knowledge needed)
2 = Easy (straightforward, accessible)
3 = Light lift (some complexity but still accessible)
4 = Moderate (average literary novel, some demands on the reader)
5 = Challenging (dense prose or structure, sustained attention needed)
6 = Dense (difficult prose, nonlinear structure, or heavy subject matter)
7 = Brutal / academic-level (very demanding: experimental structure, archaic language, or highly technical)

Book: "${title}"${author ? ' by ' + author : ''}

Respond with ONLY a JSON object, no markdown fences, no preamble: {"tier": <1-7 integer>, "reason": "<one short sentence, under 20 words>"}`;

  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });
  if (!response.ok) {
    const errBody = await response.text();
    throw new Error('Gemini API error ' + response.status + ': ' + errBody.slice(0, 120));
  }
  const data = await response.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('No response from Gemini');
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  if (!parsed.tier || parsed.tier < 1 || parsed.tier > 7) throw new Error('Invalid tier returned');
  return parsed;
}

// ---------- Settings modal ----------
function openSettingsModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Backend settings</h2>
      <div class="sub">Your Supabase project — used to sync your shelf across devices.</div>
      <div class="field">
        <label>Project URL</label>
        <input type="text" id="s_url" value="${escapeHtml(SUPABASE_URL)}" placeholder="https://xxxxx.supabase.co" />
      </div>
      <div class="field">
        <label>Publishable / anon key</label>
        <input type="text" id="s_key" value="${escapeHtml(SUPABASE_KEY)}" placeholder="sb_publishable_... or eyJ..." />
      </div>
      <div class="field" style="margin-top:20px; border-top:1px solid var(--line); padding-top:16px;">
        <label>Gemini API key (free, for AI difficulty suggestions)</label>
        <input type="text" id="s_gemini" value="${escapeHtml(GEMINI_KEY)}" placeholder="AIza..." />
        <div style="font-size:12px; color:var(--muted); margin-top:6px;">Get a free key at aistudio.google.com/apikey — no card needed.</div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="cancelSettings">Cancel</button>
        <button class="btn accent" id="saveSettings">Save & connect</button>
      </div>
    </div>
  `;
  document.getElementById('modalSlot').appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.querySelector('#cancelSettings').onclick = () => overlay.remove();
  overlay.querySelector('#saveSettings').onclick = () => {
    SUPABASE_URL = overlay.querySelector('#s_url').value.trim();
    SUPABASE_KEY = overlay.querySelector('#s_key').value.trim();
    GEMINI_KEY = overlay.querySelector('#s_gemini').value.trim();
    localStorage.setItem('shelf_supabase_url', SUPABASE_URL);
    localStorage.setItem('shelf_supabase_key', SUPABASE_KEY);
    localStorage.setItem('shelf_gemini_key', GEMINI_KEY);
    initSupabase();
    overlay.remove();
    loadBooks();
    toast(connected ? 'Connected' : 'Could not connect');
  };
}

// ---------- Events ----------
document.getElementById('searchInput').oninput = (e) => { state.search = e.target.value; renderGrid(); };
document.getElementById('sortSelect').onchange = (e) => { state.sort = e.target.value; renderGrid(); };
document.getElementById('statusFilter').onchange = (e) => { state.status = e.target.value; renderGrid(); };
document.getElementById('addFab').onclick = () => openBookModal(null);
document.getElementById('settingsFab').onclick = () => openSettingsModal();
document.getElementById('randomBtn').onclick = () => {
  const pool = filteredSorted().filter(b => b.status === 'want_to_read');
  const list = pool.length ? pool : filteredSorted();
  if (!list.length) { toast('No books to pick from'); return; }
  const pick = list[Math.floor(Math.random() * list.length)];
  openBookModal(pick);
  toast(`How about "${pick.title}"?`);
};

// ---------- Init ----------
loadBooks();
</script>
